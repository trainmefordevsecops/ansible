---
- name: Upload file to S3 using AWS CLI
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    local_file_path: "{{ lookup('env', 'WORKSPACE') }}/files/myfile.txt"
    s3_bucket: "28may2025"
    s3_key: ""
    aws_region: "ap-southeast-1"

  tasks:
    - name: Upload file to S3
      command: >
        aws s3 cp {{ local_file_path }} s3://{{ s3_bucket }}/{{ s3_key }} --region {{ aws_region }}
